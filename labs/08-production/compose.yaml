services:
  api:
    build: .
    image: rean-prod-api:1.0
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    mem_limit: 256m
    cpus: "0.50"
